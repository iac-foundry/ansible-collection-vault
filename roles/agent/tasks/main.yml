---
- name: Skip Vault Agent setup when disabled
  ansible.builtin.meta: end_host
  when: not (vault_agent_enabled | bool)

- name: Assert required connection variable is set
  ansible.builtin.assert:
    that:
      - vault_agent_vault_addr | length > 0
    fail_msg: >-
      vault_agent_vault_addr must be set to the Vault server address before
      invoking blueprint.vault.agent.

- name: Install Vault CLI
  ansible.builtin.import_tasks: install_cli.yml
  when: vault_agent_install_cli | bool

- name: Create Vault Agent service account and directories
  ansible.builtin.import_tasks: directories.yml

- name: Claim AppRole credentials from bootstrap staging directory
  ansible.builtin.import_tasks: bootstrap_staging.yml
  when: vault_agent_bootstrap_staging_dir | length > 0

- name: Write AppRole credentials from provided values
  ansible.builtin.import_tasks: auth_approle.yml
  when: vault_agent_auth_method == 'approle'

- name: Deploy Vault Agent config and systemd service
  ansible.builtin.import_tasks: deploy_agent.yml

- name: Write environment helpers
  ansible.builtin.import_tasks: env_helpers.yml
  when: vault_agent_write_env_helpers | bool
