---
- name: Ensure Vault Agent group exists
  ansible.builtin.group:
    name: "{{ vault_agent_group }}"
    system: true
    state: present
  become: true

- name: Ensure Vault Agent user exists
  ansible.builtin.user:
    name: "{{ vault_agent_user }}"
    group: "{{ vault_agent_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true

- name: Ensure Vault Agent directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ vault_agent_config_dir }}"
      owner: root
      group: root
      mode: '0755'
    - path: "{{ vault_agent_data_dir }}"
      owner: "{{ vault_agent_user }}"
      group: "{{ vault_agent_group }}"
      mode: '0700'
    - path: "{{ vault_agent_run_dir }}"
      owner: "{{ vault_agent_user }}"
      group: "{{ vault_agent_group }}"
      mode: '0750'
  become: true
