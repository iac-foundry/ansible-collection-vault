---
- name: Write shell profile helper for VAULT_ADDR
  ansible.builtin.copy:
    dest: "{{ vault_agent_profile_path }}"
    content: |
      # Vault Agent local listener — set by blueprint.vault.agent
      export VAULT_ADDR="http://{{ vault_agent_listener_address }}:{{ vault_agent_listener_port }}"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Write env file for systemd unit consumption
  ansible.builtin.copy:
    dest: "{{ vault_agent_env_file }}"
    content: |
      VAULT_ADDR=http://{{ vault_agent_listener_address }}:{{ vault_agent_listener_port }}
      VAULT_AGENT_ADDR=http://{{ vault_agent_listener_address }}:{{ vault_agent_listener_port }}
    owner: root
    group: "{{ vault_agent_group }}"
    mode: '0640'
  become: true
