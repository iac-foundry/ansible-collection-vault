---
# blueprint.vault.agent — generic Vault Agent (auto_auth + local listener).
# No org-specific defaults. All connection and credential values must be
# supplied by the consumer. This role does not assume AppRole credentials
# exist until vault_agent_require_credentials is true.

# --- Guard ---
vault_agent_enabled: true

# --- Vault server connection ---
# Required: caller must set vault_agent_vault_addr.
vault_agent_vault_addr: ""
vault_agent_vault_cacert: ""
vault_agent_vault_tls_skip_verify: false

# --- Auth method ---
# Supported: approle
vault_agent_auth_method: "approle"
vault_agent_auth_mount_path: "auth/approle"

# AppRole credential values — provide via extra-vars, Vault lookup, or
# cloud-init bootstrap staging. If both the value and the file are absent
# and vault_agent_require_credentials is true, the role fails fast.
vault_agent_approle_role_id: "{{ lookup('env', 'VAULT_ROLE_ID', default='') }}"
vault_agent_approle_secret_id: "{{ lookup('env', 'VAULT_SECRET_ID', default='') }}"
# Keep the secret_id file after first authentication so the agent can restart.
vault_agent_approle_preserve_secret_id: true

# --- Bootstrap staging ---
# Terraform / cloud-init can pre-seed credentials under this directory.
# The role moves them to vault_agent_data_dir and removes the staging dir.
# Set to '' to disable staging path handling entirely.
vault_agent_bootstrap_staging_dir: ""

# --- Paths ---
vault_agent_config_dir: "/etc/vault-agent"
vault_agent_config_path: "/etc/vault-agent/agent.hcl"
vault_agent_data_dir: "/var/lib/vault-agent"
vault_agent_run_dir: "/run/vault-agent"
vault_agent_sink_path: "{{ vault_agent_data_dir }}/agent-token"
vault_agent_approle_role_id_file: "{{ vault_agent_data_dir }}/role_id"
vault_agent_approle_secret_id_file: "{{ vault_agent_data_dir }}/secret_id"

# --- Local listener ---
# The agent exposes a token-backed Vault API on loopback so local tools
# can call Vault without holding a token themselves.
vault_agent_listener_address: "127.0.0.1"
vault_agent_listener_port: 8200

# --- Environment helpers ---
# Writes /etc/profile.d and an env file so shell sessions and systemd
# units can source VAULT_ADDR without hard-coding it.
vault_agent_write_env_helpers: true
vault_agent_profile_path: "/etc/profile.d/vault-agent.sh"
vault_agent_env_file: "{{ vault_agent_config_dir }}/agent.env"

# --- Service ---
vault_agent_service_name: "vault-agent"
vault_agent_user: "vault"
vault_agent_group: "vault"

# --- CLI ---
vault_agent_install_cli: true
vault_agent_cli_version: "1.19.5"
vault_agent_cli_bin_path: "/usr/local/bin/vault"

# --- Validation ---
# Set false to allow the role to run without credentials in place (useful
# when credentials will be seeded by a later step or a separate playbook).
vault_agent_require_credentials: true
