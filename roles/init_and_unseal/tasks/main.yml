---
# blueprints.vault.init_and_unseal — Initialize Vault + configure auto-unseal
# P0-3: Vault initialization with unseal key backup verification
# P1-2: Root token to tmpfs + auto-delete
# P1-6: Vault audit logging enabled at init
# P1-8: Auto-unseal with retry logic and systemd service
# P1-9: Seal status monitoring

- name: "Initialize Vault and configure auto-unseal"
  block:
    # ===== Task 1: Check idempotency (Vault already initialized?) =====
    # A filesystem-path stat check was used previously (a path under
    # /opt/vault/data/core/hsm that never matched this role's actual file
    # storage location) -- it always reported "not initialized" regardless
    # of real state, which would have retried `vault operator init` against
    # an already-initialized Vault on any re-run. Querying /v1/sys/health
    # directly is correct regardless of storage backend internals.
    - name: "Check if Vault is already initialized"
      uri:
        url: "{{ vault_api_endpoint }}/v1/sys/health"
        method: GET
        ca_path: "{{ vault_cacert_path }}"
        status_code: [200, 429, 472, 473, 501, 503]
      register: vault_health_check
      changed_when: false

    - name: "Set fact: Vault is already initialized"
      set_fact:
        vault_is_initialized: "{{ vault_health_check.json.initialized | default(false) }}"
      changed_when: false

    # ===== Task 2: Run vault operator init (if not already initialized) =====
    - name: "Run vault operator init (generates unseal keys + root token)"
      environment:
        VAULT_ADDR: "{{ vault_api_endpoint }}"
        VAULT_CACERT: "{{ vault_cacert_path }}"
      shell: |
        vault operator init \
          -key-shares={{ vault_unseal_key_shares }} \
          -key-threshold={{ vault_unseal_key_threshold }} \
          -format=json 2>&1 | tee {{ vault_init_output_path }}
      register: vault_init_output_raw
      no_log: true  # Don't log init output (contains keys + token)
      failed_when: false
      changed_when: "'Unseal Key' in vault_init_output_raw.stdout"
      when: not vault_is_initialized

    - name: "Restrict permissions on raw init output (contains keys + root token)"
      file:
        path: "{{ vault_init_output_path }}"
        mode: "0600"
        owner: "root"
        group: "root"
      when:
        - not vault_is_initialized
        - vault_init_output_raw.rc == 0

    - name: "Read vault operator init output file"
      slurp:
        src: "{{ vault_init_output_path }}"
      register: vault_init_output_slurp
      no_log: true
      when:
        - not vault_is_initialized
        - vault_init_output_raw.rc == 0

    - name: "Parse vault operator init output"
      set_fact:
        # lookup('file', ...) always reads from the control node, never the
        # delegated remote host -- this file is written on sec01 (the
        # previous task's tee, delegated there), so lookup() could never
        # find it. slurp respects delegation correctly.
        vault_init_json: "{{ vault_init_output_slurp.content | b64decode | from_json }}"
      no_log: true
      when:
        - not vault_is_initialized
        - vault_init_output_raw.rc == 0

    # ===== Task 3: Extract and store unseal keys (P0-3) =====
    - name: "Extract root token and unseal keys"
      set_fact:
        vault_root_token: "{{ vault_init_json.root_token }}"
        # NOT vault_init_json.keys: that field does not exist in this
        # Vault version's init JSON output at all (real fields are
        # unseal_keys_hex / unseal_keys_b64) -- confirmed by inspecting the
        # actual init output structure live. It was ALSO a latent Jinja2
        # trap even if the field existed: dict.keys is a native Python
        # method, so dot-notation attribute lookup (vault_init_json.keys)
        # resolves to that bound method (rendering as
        # "<built-in method keys of dict object at 0x...>") before Jinja2
        # ever falls back to item lookup. unseal_keys_hex has no such
        # collision. vault operator unseal expects hex-encoded keys.
        vault_unseal_keys: "{{ vault_init_json.unseal_keys_hex }}"
        vault_threshold: "{{ vault_unseal_key_threshold }}"
      no_log: true
      when:
        - not vault_is_initialized
        - vault_init_json is defined

    # ===== Task 4: Write unseal keys to secure file =====
    - name: "Write unseal keys to {{ vault_unseal_keys_path }} (0600 perms)"
      copy:
        content: |
          {
            "keys": {{ vault_unseal_keys | to_json(indent=2) }},
            "threshold": {{ vault_unseal_key_threshold }}
          }
        dest: "{{ vault_unseal_keys_path }}"
        mode: "0600"
        owner: "root"
        group: "root"
      no_log: true
      when:
        - not vault_is_initialized
        - vault_unseal_keys is defined

    # ===== Task 5: Write root token to tmpfs (P1-2 mitigation) =====
    - name: "Write root token to tmpfs {{ vault_root_token_path }} (ephemeral, 0600 perms)"
      copy:
        content: "{{ vault_root_token }}"
        dest: "{{ vault_root_token_path }}"
        mode: "0600"
        owner: "root"
        group: "root"
      no_log: true
      when:
        - not vault_is_initialized
        - vault_root_token is defined

    # ===== Task 6: Print unseal keys + operator instructions (P0-3, P1-1) =====
    - name: "Print unseal keys and operator instructions"
      debug:
        msg: |
          ========== CRITICAL: UNSEAL KEYS GENERATED ==========

          Vault has been initialized with the following configuration:
          - Key Shares: {{ vault_unseal_key_shares }}
          - Key Threshold: {{ vault_unseal_key_threshold }} (3-of-5 Shamir)

          UNSEAL KEYS:
          {% for key in vault_unseal_keys %}
          {{ loop.index }}. {{ key }}
          {% endfor %}

          ROOT TOKEN:
          {{ vault_root_token }}

          NEXT STEPS (OPERATOR MUST COMPLETE):
          1. Back up unseal keys to secure location IMMEDIATELY:
             - 1Password vault
             - Encrypted USB drive
             - Hardware security module
             - Paper backup (print + store in safe)

          2. Verify backup location is secure and accessible

          3. After backup complete, answer "yes" at the next prompt

          4. Unseal script will run; Vault will be unsealed

          5. After unsealing, root token will be automatically deleted
             from disk (ephemeral storage)

          SECURITY NOTES:
          - These keys are displayed ONCE ONLY. Copy them carefully.
          - Never commit these keys to git or logs.
          - Never share keys unencrypted via email/chat.
          - Root token is temporary (stored in tmpfs, auto-deleted)
          - Unseal keys are stored on sec01 at {{ vault_unseal_keys_path }}
          - Raw init output (same keys + root token) also at {{ vault_init_output_path }}
            until vault_cleanup_sensitive_files_enabled is explicitly set true

          =========================================================
      when:
        - not vault_is_initialized
        - vault_unseal_keys is defined

    # ===== Task 7: Backup verification (P1-1 mitigation) =====
    - name: "OPERATOR GATE: Verify unseal keys are backed up"
      pause:
        prompt: |
          ========== OPERATOR GATE: BACKUP VERIFICATION ==========

          Have you successfully backed up the unseal keys to a secure location?

          Answer 'yes' only if you have:
          - Written all 5 unseal keys to secure storage
          - Verified backup location is accessible
          - Confirmed backup matches printed output above

          Type 'yes' to proceed with unsealing:
        echo: yes
      register: operator_backup_confirmation
      when:
        - not vault_is_initialized
        - vault_backup_verification_enabled

    - name: "Fail if operator did not confirm backup"
      fail:
        msg: |
          Unseal keys must be backed up before proceeding.
          Cannot proceed to unsealing without operator confirmation.

          Please back up the unseal keys to a secure location and re-run this playbook.
      when:
        - not vault_is_initialized
        - vault_backup_verification_enabled
        - operator_backup_confirmation.user_input | lower != 'yes'

    # ===== Resumption path: Vault was already initialized in an earlier,
    # interrupted run (e.g. the operator gate above aborted the play before
    # the unseal script / systemd service / audit logging tasks below ever
    # ran). Those tasks need vault_root_token / vault_unseal_keys as facts,
    # which the fresh-init path above only sets `when: not
    # vault_is_initialized`. Re-read the same values from the files this
    # role already wrote them to on a prior run, so the tasks below work
    # identically regardless of which path populated the facts. =====
    - name: "Resumption: read existing root token from {{ vault_root_token_path }}"
      slurp:
        src: "{{ vault_root_token_path }}"
      register: _vault_root_token_resume_slurp
      no_log: true
      failed_when: false
      when:
        - vault_is_initialized
        - vault_root_token is not defined

    - name: "Resumption: set vault_root_token fact from file"
      set_fact:
        vault_root_token: "{{ _vault_root_token_resume_slurp.content | b64decode }}"
      no_log: true
      when:
        - vault_is_initialized
        - vault_root_token is not defined
        - _vault_root_token_resume_slurp is defined
        - _vault_root_token_resume_slurp.content is defined

    - name: "Resumption: read existing unseal keys from {{ vault_unseal_keys_path }}"
      slurp:
        src: "{{ vault_unseal_keys_path }}"
      register: _vault_unseal_keys_resume_slurp
      no_log: true
      failed_when: false
      when:
        - vault_is_initialized
        - vault_unseal_keys is not defined

    - name: "Resumption: set vault_unseal_keys fact from file"
      set_fact:
        vault_unseal_keys: "{{ (_vault_unseal_keys_resume_slurp.content | b64decode | from_json).keys }}"
      no_log: true
      when:
        - vault_is_initialized
        - vault_unseal_keys is not defined
        - _vault_unseal_keys_resume_slurp is defined
        - _vault_unseal_keys_resume_slurp.content is defined

    # ===== Task 8: Generate unseal script (P1-8 retry logic) =====
    # Not gated on not vault_is_initialized: template is naturally
    # idempotent (no change if content is identical), and this must also
    # run on the resumption path above.
    - name: "Generate unseal script at {{ vault_unseal_script_path }}"
      template:
        src: "unseal-script.sh.j2"
        dest: "{{ vault_unseal_script_path }}"
        mode: "0700"
        owner: "root"
        group: "root"
      vars:
        vault_keys: "{{ vault_unseal_keys }}"
      no_log: true
      when:
        - vault_unseal_keys is defined

    # ===== Task 9: Create systemd auto-unseal service (P1-8 systemd retry) =====
    - name: "Create systemd auto-unseal service file"
      template:
        src: "vault-auto-unseal.service.j2"
        dest: "{{ vault_unseal_service_path }}"
        mode: "0644"
        owner: "root"
        group: "root"
      notify: "Reload systemd daemon"

    # ===== Task 10: Enable systemd service (do not start yet) =====
    - name: "Enable {{ vault_unseal_service_name }} service (disabled until operator unseals)"
      systemd:
        name: "{{ vault_unseal_service_name }}"
        enabled: yes
        daemon_reload: yes

    # ===== Task 11: Create healthcheck timer (P1-9 mitigation) =====
    - name: "Create systemd timer for periodic seal status checks"
      template:
        src: "vault-healthcheck.timer.j2"
        dest: "/etc/systemd/system/vault-healthcheck.timer"
        mode: "0644"
        owner: "root"
        group: "root"
      notify: "Reload systemd daemon"
      when:
        - vault_unseal_enable_health_timer

    - name: "Create systemd service for seal status healthcheck"
      template:
        src: "vault-healthcheck.service.j2"
        dest: "/etc/systemd/system/vault-healthcheck.service"
        mode: "0644"
        owner: "root"
        group: "root"
      notify: "Reload systemd daemon"
      when:
        - vault_unseal_enable_health_timer

    - name: "Create healthcheck script"
      template:
        src: "vault-healthcheck.sh.j2"
        dest: "/usr/local/bin/vault-healthcheck.sh"
        mode: "0755"
        owner: "root"
        group: "root"
      when:
        - vault_unseal_enable_health_timer

    # ===== Task 12: Enable and start healthcheck timer =====
    - name: "Enable and start vault-healthcheck timer"
      systemd:
        name: "vault-healthcheck.timer"
        enabled: yes
        state: started
        daemon_reload: yes
      when:
        - vault_unseal_enable_health_timer

    # Task 13 (P1-6, Vault audit logging) intentionally does NOT live here:
    # this role runs as Step 4 in the orchestration playbook, and the
    # playbook's own Step 5 (explicit unseal + health confirmation) runs
    # strictly after this role returns. Vault is still genuinely sealed at
    # this point in the play, every time -- not just on the resumption
    # path -- so `vault audit enable` always failed here with "Vault is
    # sealed" after exhausting its retries. The caller now enables audit
    # logging itself, after Step 5 confirms Vault is unsealed.

    # ===== Task 14: Clean up sensitive on-disk files (opt-in only) =====
    # Never automatic: deleting the only on-disk copies of the unseal keys
    # before the operator has genuinely backed them up elsewhere would be
    # an unrecoverable data-loss bug, not a convenience. The operator gate
    # above (Task 7) only confirms a human typed "yes" -- it does not by
    # itself prove a real backup exists. Set
    # vault_cleanup_sensitive_files_enabled: true explicitly (e.g. via
    # extra-vars on a follow-up run) once backup is independently verified.
    - name: "Remove raw init output file (contains keys + root token in the clear)"
      file:
        path: "{{ vault_init_output_path }}"
        state: absent
      changed_when: false
      when: vault_cleanup_sensitive_files_enabled

  tags:
    - "vault"
    - "vault_init"
    - "vault_unseal"
