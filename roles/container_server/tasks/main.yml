---
# container_server: Deploy Vault container with TLS listener and file storage backend.
#
# Responsibilities (per design):
#   1. Assert vault_server_image is supplied (no org default)
#   2. Assert TLS cert + key are supplied by caller (fail-fast if missing)
#   3. Create vault user/group and data directory with restrictive perms
#   4. Write TLS cert and key to secure paths
#   5. Render config.hcl from template with storage + listener blocks
#   6. Start/restart Vault container via community.docker.docker_container
#   7. Expose listener addresses as facts for platform-layer consumers
#   8. Do NOT init or unseal Vault (that's init_and_unseal's responsibility)
#
# Constraints:
#   - Idempotence-first: use community.docker.docker_container in declarative mode
#   - No_log on any task handling TLS keys or admin secrets
#   - Fail-fast asserts on required inputs before any container starts
#   - No include_role / import_role of other blueprints.* collections
#   - All configuration from caller-supplied variables; no external retrieval
#   - Storage backend: file-based (no external dependencies like PostgreSQL)
#   - TLS required (per design Decision 5, mandate TLS even for dev)

- name: Assert required inputs are supplied by the caller
  ansible.builtin.assert:
    that:
      - vault_server_image | length > 0
      - vault_server_tls_cert | length > 0
      - vault_server_tls_key | length > 0
    fail_msg: |
      Required inputs missing:
        - vault_server_image: Container image reference (caller-supplied; no org default). Example: 'hashicorp/vault:1.15.0'
        - vault_server_tls_cert: TLS certificate (PEM-encoded, from step-ca or caller-supplied)
        - vault_server_tls_key: TLS private key (PEM-encoded, from step-ca or caller-supplied)
    success_msg: "Required inputs present (image + TLS cert + TLS key)."
  no_log: false
  tags:
    - container_server

- name: Create vault group
  ansible.builtin.group:
    name: vault
    gid: "{{ vault_server_gid | default(omit, true) }}"
    system: true
    state: present
  register: vault_server_group_result
  tags:
    - container_server

- name: Create vault user and group
  ansible.builtin.user:
    name: vault
    uid: "{{ vault_server_uid | default(omit, true) }}"
    group: vault
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  register: vault_server_user_result
  tags:
    - container_server

- name: Capture the actual uid/gid assigned (whether fixed or OS-allocated)
  ansible.builtin.set_fact:
    vault_server_actual_uid: "{{ vault_server_user_result.uid }}"
    vault_server_actual_gid: "{{ vault_server_group_result.gid }}"
  tags:
    - container_server

- name: Create vault data directory with restrictive permissions
  ansible.builtin.file:
    path: "{{ vault_server_data_dir }}"
    state: directory
    owner: vault
    group: vault
    mode: "0700"
  tags:
    - container_server

- name: Create vault config directory
  ansible.builtin.file:
    path: "{{ vault_server_data_dir }}/config"
    state: directory
    owner: vault
    group: vault
    mode: "0700"
  tags:
    - container_server

- name: Create vault file storage directory (bind-mounted to /vault/file;
    Docker would otherwise auto-create this as root on first mount, since
    nothing else in this role creates it ahead of time)
  ansible.builtin.file:
    path: "{{ vault_server_data_dir }}/file"
    state: directory
    owner: vault
    group: vault
    mode: "0700"
  tags:
    - container_server

- name: Write TLS certificate to secure location
  ansible.builtin.copy:
    content: "{{ vault_server_tls_cert }}"
    dest: "{{ vault_server_data_dir }}/config/tls.crt"
    owner: vault
    group: vault
    mode: "0600"
  tags:
    - container_server

- name: Write TLS private key to secure location
  ansible.builtin.copy:
    content: "{{ vault_server_tls_key }}"
    dest: "{{ vault_server_data_dir }}/config/tls.key"
    owner: vault
    group: vault
    mode: "0600"
  no_log: true
  tags:
    - container_server

- name: Render config.hcl from template
  ansible.builtin.template:
    src: config.hcl.j2
    dest: "{{ vault_server_data_dir }}/config/config.hcl"
    owner: vault
    group: vault
    mode: "0600"
  tags:
    - container_server

- name: Start/restart Vault container
  community.docker.docker_container:
    name: vault
    image: "{{ vault_server_image }}"
    state: started
    restart_policy: unless-stopped
    user: "{{ vault_server_actual_uid }}:{{ vault_server_actual_gid }}"
    cap_drop:
      - ALL
    capabilities:
      # IPC_LOCK is required because config.hcl does not set disable_mlock;
      # Vault calls mlock() to prevent secrets from being swapped to disk.
      - IPC_LOCK
    ulimits:
      # The IPC_LOCK capability alone is not sufficient: Docker also
      # enforces a separate memlock ulimit independent of capabilities,
      # and its default is too low for Vault's mlock() call to succeed
      # ("Failed to lock memory: cannot allocate memory"). Set unlimited,
      # matching HashiCorp's own documented Docker deployment guidance.
      - "memlock:-1:-1"
    ports:
      - "{{ vault_server_https_port }}:8200"
    volumes:
      - "{{ vault_server_data_dir }}/config:/vault/config:ro"
      - "{{ vault_server_data_dir }}/file:/vault/file"
    env:
      VAULT_ADDR: "https://0.0.0.0:8200"
      VAULT_CONFIG_DIR: "/vault/config"
      # The official image's entrypoint assumes it can run as root to chown
      # /vault/config, /vault/logs and /vault/file to the vault user, then
      # setcap cap_ipc_lock on the vault binary itself. Both fail outright
      # under a non-root user with cap_drop: ALL (one chown call has no
      # error handling at all in the entrypoint script, so the whole
      # container exits). Both are unnecessary here: the data/config
      # directories are already owned by the same uid:gid this container
      # runs as (set by this role before the container starts), and
      # IPC_LOCK is already granted at the container level above, not via
      # the entrypoint's own setcap call.
      SKIP_CHOWN: "true"
      SKIP_SETCAP: "true"
    # Just "server" -- the official entrypoint already shifts "server" off
    # and reconstructs the full vault invocation itself, including
    # -config="$VAULT_CONFIG_DIR" (set above). Passing our own redundant
    # -config=/vault/config/config.hcl here resulted in TWO -config flags
    # on the same command line and a same-process double-bind: "Error
    # initializing listener of type tcp: listen tcp4 0.0.0.0:8200: bind:
    # address already in use" -- confirmed by reproducing the exact
    # invocation manually both with and without the redundant flag.
    command: "server"
  tags:
    - container_server

- name: Expose HTTPS listener address as fact
  ansible.builtin.set_fact:
    vault_server_https_address: "https://localhost:{{ vault_server_https_port }}"
  tags:
    - container_server

- name: Container server convergence complete
  ansible.builtin.debug:
    msg: |
      container_server role complete.
      Vault container running with TLS listener and file storage backend.
        - HTTPS listener: {{ vault_server_https_address }}
        - Data directory: {{ vault_server_data_dir }}
        - TLS certificates loaded from config directory
        - Awaiting init_and_unseal role for vault operator init
  tags:
    - container_server
