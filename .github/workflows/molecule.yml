name: Molecule Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'roles/**'
      - '.github/workflows/molecule.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'roles/**'
      - '.github/workflows/molecule.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        role:
          - client
          - container_server
          - init_and_unseal
          - systemd_server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install molecule and docker dependencies
        run: |
          pip install --upgrade pip
          pip install molecule molecule-plugins[docker] docker

      - name: Run Molecule tests for ${{ matrix.role }}
        run: |
          cd roles/${{ matrix.role }}
          molecule test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: molecule-logs-${{ matrix.role }}
          path: roles/${{ matrix.role }}/molecule
